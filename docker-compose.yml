services:
  postgres:
    image: postgres:16-alpine
    container_name: hospedex-postgres
    environment:
      POSTGRES_USER: hospedex
      POSTGRES_PASSWORD: hospedex
      POSTGRES_DB: hospedex
    ports:
      - "5432:5432"
    volumes:
      - hospedex_postgres_data:/var/lib/postgresql/data
      - ./apps/api/database/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hospedex -d hospedex"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  hospedex_postgres_data:

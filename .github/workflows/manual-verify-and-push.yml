name: Manual verify and push generated changes

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: Commit message for generated changes
        required: false
        default: "chore: update generated files"

permissions:
  contents: write

jobs:
  verify-and-commit:
    name: Verify and commit generated changes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm -r test

      - name: Build
        run: pnpm -r build

      - name: Commit generated changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: ${{ github.event.inputs.commit_message }}
          branch: ${{ github.ref_name }}
